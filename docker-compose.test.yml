name: solidariantest

services:
  db:
    image: postgres:18.1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test
    ports:
      - 127.0.0.1:25432:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d test']
      interval: 5s
      timeout: 5s
      retries: 5

  kurrentdb:
    image: kurrentplatform/kurrentdb:25.0.0
    command: '--run-projections=All --insecure --enable-atom-pub-over-http'
    ports:
      - 127.0.0.1:22113:2113
    healthcheck:
      test:
        ['CMD-SHELL', 'curl -sf http://localhost:2113/health/live || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.12.3-alpine
    command: '-js -m 8222'
    ports:
      - 127.0.0.1:24222:4222
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8222/varz']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.4.0-alpine
    ports:
      - 127.0.0.1:26379:6379
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      retries: 5
