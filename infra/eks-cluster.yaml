AWSTemplateFormatVersion: '2010-09-09'
Description: Infraestructura SolidarianID

Parameters:
  LabRoleArn:
    Type: String
    Description: ARN del rol 'LabRole' preexistente en la cuenta de AWS Academy

  DBPasswordCore:
    Type: String
    NoEcho: true
    Description: Contraseña maestra para la base de datos RDS de Core

  DBPasswordAdmin:
    Type: String
    NoEcho: true
    Description: Contraseña maestra para la base de datos RDS de Admin

  DBPasswordIdentity:
    Type: String
    NoEcho: true
    Description: Contraseña maestra para la base de datos RDS de Identity

Resources:
  # --- VPC y Networking ---
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{ Key: Name, Value: SolidarianVPC }]

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        [
          { Key: Name, Value: PublicSubnet1 },
          { Key: kubernetes.io/role/elb, Value: 1 },
        ]

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        [
          { Key: Name, Value: PublicSubnet2 },
          { Key: kubernetes.io/role/elb, Value: 1 },
        ]

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicSubnet1, RouteTableId: !Ref RouteTable }

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicSubnet2, RouteTableId: !Ref RouteTable }

  EKSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SG para EKS
      VpcId: !Ref VPC

  # --- Cluster EKS ---
  EKSCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: SolidarianCluster
      Version: '1.34'
      RoleArn: !Ref LabRoleArn
      ResourcesVpcConfig:
        SubnetIds: [!Ref PublicSubnet1, !Ref PublicSubnet2]
        SecurityGroupIds: [!Ref EKSSecurityGroup]

  EKSNodeGroup:
    Type: AWS::EKS::Nodegroup
    Properties:
      ClusterName: !Ref EKSCluster
      NodeRole: !Ref LabRoleArn
      Subnets: [!Ref PublicSubnet1, !Ref PublicSubnet2]
      InstanceTypes: [t3.medium]
      ScalingConfig:
        MinSize: 3
        MaxSize: 5
        DesiredSize: 3

  # --- Security Groups para servicios gestionados ---
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SG para RDS PostgreSQL - acceso desde nodos EKS
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 10.0.0.0/16

  ElastiCacheSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SG para ElastiCache Redis - acceso desde nodos EKS
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          CidrIp: 10.0.0.0/16

  # --- Subnet Groups para servicios gestionados ---
  RDSSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group para instancias RDS de SolidarianID
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

  ElastiCacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: Subnet group para ElastiCache Redis de SolidarianID
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

  # --- Parameter Group para desactivar SSL obligatorio ---
  RDSParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: 'Permitir conexiones sin SSL para SolidarianID'
      Family: postgres15
      Parameters:
        rds.force_ssl: '0'

  # --- RDS PostgreSQL ---
  RDSCore:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    Properties:
      DBInstanceIdentifier: solidarianid-core
      DBInstanceClass: db.t3.micro
      Engine: postgres
      EngineVersion: '15'
      MasterUsername: core_user
      MasterUserPassword: !Ref DBPasswordCore
      DBName: core_db
      AllocatedStorage: '20'
      StorageType: gp2
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      DBSubnetGroupName: !Ref RDSSubnetGroup
      PubliclyAccessible: false
      MultiAZ: false
      DeletionProtection: false
      DBParameterGroupName: !Ref RDSParameterGroup

  RDSAdmin:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    Properties:
      DBInstanceIdentifier: solidarianid-admin
      DBInstanceClass: db.t3.micro
      Engine: postgres
      EngineVersion: '15'
      MasterUsername: admin_user
      MasterUserPassword: !Ref DBPasswordAdmin
      DBName: admin_db
      AllocatedStorage: '20'
      StorageType: gp2
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      DBSubnetGroupName: !Ref RDSSubnetGroup
      PubliclyAccessible: false
      MultiAZ: false
      DeletionProtection: false
      DBParameterGroupName: !Ref RDSParameterGroup

  RDSIdentity:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    Properties:
      DBInstanceIdentifier: solidarianid-identity
      DBInstanceClass: db.t3.micro
      Engine: postgres
      EngineVersion: '15'
      MasterUsername: identity_user
      MasterUserPassword: !Ref DBPasswordIdentity
      DBName: identity_db
      AllocatedStorage: '20'
      StorageType: gp2
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      DBSubnetGroupName: !Ref RDSSubnetGroup
      PubliclyAccessible: false
      MultiAZ: false
      DeletionProtection: false
      DBParameterGroupName: !Ref RDSParameterGroup

  # --- ElastiCache Redis ---
  ElastiCacheRedis:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      ClusterName: solidarianid-redis
      Engine: redis
      CacheNodeType: cache.t3.micro
      NumCacheNodes: 1
      CacheSubnetGroupName: !Ref ElastiCacheSubnetGroup
      VpcSecurityGroupIds:
        - !Ref ElastiCacheSecurityGroup

Outputs:
  ClusterName:
    Description: Nombre del Cluster para usar en kubectl
    Value: !Ref EKSCluster

  RDSCoreEndpoint:
    Description: Endpoint del RDS PostgreSQL para Core
    Value: !GetAtt RDSCore.Endpoint.Address

  RDSAdminEndpoint:
    Description: Endpoint del RDS PostgreSQL para Admin
    Value: !GetAtt RDSAdmin.Endpoint.Address

  RDSIdentityEndpoint:
    Description: Endpoint del RDS PostgreSQL para Identity
    Value: !GetAtt RDSIdentity.Endpoint.Address

  ElastiCacheEndpoint:
    Description: Endpoint del nodo Redis gestionado de ElastiCache
    Value: !GetAtt ElastiCacheRedis.RedisEndpoint.Address
