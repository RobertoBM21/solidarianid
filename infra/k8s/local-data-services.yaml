---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:8.4.0-alpine
          ports: [{ containerPort: 6379 }]
          readinessProbe:
            exec:
              command: ['redis-cli', 'ping']
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: '50m'
              memory: '64Mi'
            limits:
              cpu: '150m'
              memory: '128Mi'
---
apiVersion: v1
kind: Service
metadata: { name: redis }
spec:
  selector: { app: redis }
  ports: [{ protocol: TCP, port: 6379, targetPort: 6379 }]
