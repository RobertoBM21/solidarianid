# --- POSTGRESQL Y REDIS INTERNOS PARA MODO SIN SERVICIOS GESTIONADOS AWS ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-core
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres-core } }
  template:
    metadata: { labels: { app: postgres-core } }
    spec:
      containers:
        - name: postgres-core
          image: postgres:15-alpine
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_USER, value: 'core_user' }
            - { name: POSTGRES_PASSWORD, value: '${DB_PASSWORD_CORE}' }
            - { name: POSTGRES_DB, value: 'core_db' }
          readinessProbe:
            exec:
              command: ['pg_isready', '-U', 'core_user', '-d', 'core_db']
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '250m'
              memory: '256Mi'
---
apiVersion: v1
kind: Service
metadata: { name: postgres-core }
spec:
  selector: { app: postgres-core }
  ports: [{ protocol: TCP, port: 5432, targetPort: 5432 }]
---
