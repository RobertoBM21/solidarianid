name: SolidarianID CD (EKS)

on:
  push:
    branches: [cloud]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY_CORE: ${{ secrets.ECR_REPOSITORY_CORE }}
  ECR_REPOSITORY_ADMIN: ${{ secrets.ECR_REPOSITORY_ADMIN }}
  ECR_REPOSITORY_GATEWAY: ${{ secrets.ECR_REPOSITORY_GATEWAY }}
  ECR_REPOSITORY_IDENTITY: ${{ secrets.ECR_REPOSITORY_IDENTITY }}
  ECR_REPOSITORY_FRONT: ${{ secrets.ECR_REPOSITORY_FRONT }}
  STACK_NAME: SolidarianStack

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push Core image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_CORE:$IMAGE_TAG --build-arg APP=core .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_CORE:$IMAGE_TAG

      - name: Build, tag, and push Admin image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_ADMIN:$IMAGE_TAG --build-arg APP=admin .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_ADMIN:$IMAGE_TAG

      - name: Build, tag, and push Gateway image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_GATEWAY:$IMAGE_TAG --build-arg APP=gateway .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_GATEWAY:$IMAGE_TAG

      - name: Build, tag, and push Identity image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_IDENTITY:$IMAGE_TAG --build-arg APP=identity .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_IDENTITY:$IMAGE_TAG

      - name: Build, tag, and push Front image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_FRONT:$IMAGE_TAG --build-arg NEXT_PUBLIC_GATEWAY_URL=${{ secrets.GATEWAY_URL }} -f Dockerfile.front .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONT:$IMAGE_TAG

      - name: Deploy CloudFormation Stack
        run: |
          aws cloudformation deploy \
            --template-file infra/eks-cluster.yaml \
            --stack-name ${{ env.STACK_NAME }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides LabRoleArn=${{ secrets.LAB_ROLE_ARN }}

      - name: Update Kubeconfig
        run: |
          CLUSTER_NAME=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='ClusterName'].OutputValue" \
            --output text)

          echo "Connecting to cluster: $CLUSTER_NAME"
          aws eks update-kubeconfig --name $CLUSTER_NAME --region ${{ env.AWS_REGION }}

      - name: Install Metrics Server (for HPA)
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml

      - name: Deploy to Kubernetes
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          DB_PASSWORD_CORE: ${{ secrets.DB_PASSWORD_CORE }}
          DB_PASSWORD_IDENTITY: ${{ secrets.DB_PASSWORD_IDENTITY }}
          DB_PASSWORD_ADMIN: ${{ secrets.DB_PASSWORD_ADMIN }}
          STRIPE_SK: ${{ secrets.STRIPE_SK }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          GATEWAY_URL: ${{ secrets.GATEWAY_URL }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          envsubst < infra/k8s/deployment.yaml > infra/k8s/deployment-final.yaml

          kubectl apply -f infra/k8s/deployment-final.yaml

          # Verify status
          kubectl get services
