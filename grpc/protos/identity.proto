syntax = "proto3";

package identity;

service IdentityService {
  rpc ListUsers (Pagination) returns (UsersList);
  rpc GetUser(GetUserRequest) returns (UserProfile);
}


message Pagination {
  optional int32 page = 1;
  optional string search = 2;
}

message UsersList {
  repeated UsersListItem users = 1;
  int32 total_pages = 2;
}

message UsersListItem {
  string id = 1;
  string name = 2;
  repeated string communities = 3;
}

message GetUserRequest {
  string user_id = 1;
}

message UserProfile {
  string id = 1;
  string name = 2;
  string email = 3;
  optional string phone = 4;
  optional string city = 5;
  optional string country = 6;
}
