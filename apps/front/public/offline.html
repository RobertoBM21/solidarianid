<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d6efd" />
    <title>SolidarianID | Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f7fbff 0%, #eef4ff 100%);
        color: #1f2937;
      }

      main {
        width: min(560px, calc(100% - 2rem));
        padding: 2rem;
        border-radius: 1rem;
        background: #ffffff;
        box-shadow: 0 16px 48px rgba(15, 23, 42, 0.08);
        border: 1px solid #dbe7ff;
      }

      h1 {
        margin: 0 0 1rem;
        color: #0d6efd;
        font-size: clamp(1.8rem, 4vw, 2.4rem);
      }

      p {
        margin: 0 0 0.75rem;
        line-height: 1.6;
      }

      a {
        display: inline-block;
        margin-top: 1rem;
        color: #0d6efd;
        font-weight: 600;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Estás offline</h1>
      <p>SolidarianID no ha podido cargar esta vista desde la red.</p>
      <p>
        Puedes seguir usando los recursos básicos que ya estén en caché y volver
        a intentarlo cuando recuperes la conexión.
      </p>
      <a href="/">Volver al inicio</a>
    </main>
  </body>
</html>
